<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Workbench Player Demo</title>
  <script src="https://unpkg.com/wavesurfer@7"></script>
  <script src="../dist/birdnet-player.iife.js"></script>
  <link rel="stylesheet" href="../dist/birdnet-player.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f6fa; }
    .wrap { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0 0 12px; }
    .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Audio Workbench Player Demo</h1>
    <div class="card">
      <div id="player"></div>
    </div>
  </div>

  <script>
    const playerRoot = document.getElementById('player');
    const player = new BirdNETPlayerModule.BirdNETPlayer(playerRoot, {
      showFileOpen: true,
      showTransport: true
    });

    player.ready.then(() => {
      console.log('BirdNET player ready');
    });
  </script>
</body>
</html>
