<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignaVis Desktop</title>
  <link rel="stylesheet" href="/src/styles/tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ───────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 6px;
      height: var(--toolbar-height);
      padding: 0 12px;
      background: var(--color-toolbar);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .brand-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--color-accent);
      letter-spacing: 0.02em;
      margin-right: 4px;
    }
    .tb-sep { width: 1px; height: 20px; background: var(--color-border); flex-shrink: 0; margin: 0 2px; }
    .tb-spacer { flex: 1; }

    .tb-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: transparent;
      color: var(--color-text-primary);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }
    .tb-btn:hover { background: var(--color-accent-faint); border-color: var(--color-accent); }
    .tb-btn--primary { background: var(--color-accent); color: #000; border-color: var(--color-accent); }
    .tb-btn--primary:hover { background: var(--color-accent-hover); }
    .tb-btn--danger { border-color: var(--color-danger); color: var(--color-danger); }
    .tb-btn--danger:hover { background: var(--color-danger-soft); }

    /* ── Main layout: left | centre (browser + player) | right ── */
    .layout {
      display: grid;
      grid-template-columns: 240px 1fr 260px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Generic panel ───────────────────────────────────────── */
    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--color-border);
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }

    .panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-secondary);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg-secondary);
      flex-shrink: 0;
    }

    .panel__body {
      flex: 1;
      overflow-y: auto;
    }

    /* ── Centre pane ─────────────────────────────────────────── */
    .centre-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--color-border);
    }

    /* File browser sub-panel (shown once a folder is opened) */
    #fileBrowserPanel {
      flex-shrink: 0;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      max-height: 220px;
    }

    #fileList {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      font-size: 12px;
    }
    .file-item:hover { background: var(--color-accent-faint); }
    .file-item--active { background: var(--color-accent-faint); border-left: 2px solid var(--color-accent); }
    .file-item__icon { flex-shrink: 0; color: var(--color-text-secondary); }
    .file-item__name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item__load-btn { margin-left: auto; flex-shrink: 0; font-size: 11px; padding: 2px 8px; }

    /* Player area */
    #playerContainer {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* BirdNETPlayer renders into this, needs to fill the space */
    #playerContainer > * { flex: 1; min-height: 0; }

    .centre-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--color-text-secondary);
      padding: 24px;
      text-align: center;
    }
    .centre-placeholder svg { opacity: 0.2; }
    .centre-placeholder p { font-size: 13px; max-width: 280px; line-height: 1.5; }

    /* ── Project list ─────────────────────────────────────────── */
    #projectList { list-style: none; }

    .project-item {
      display: flex;
      flex-direction: column;
      padding: 7px 10px;
      cursor: pointer;
      border-bottom: 1px solid var(--color-border);
      gap: 2px;
    }
    .project-item:hover { background: var(--color-accent-faint); }
    .project-item--active { background: var(--color-accent-faint); border-left: 2px solid var(--color-accent); }
    .project-item__name { font-weight: 500; font-size: 12px; }
    .project-item__meta { font-size: 11px; color: var(--color-text-secondary); }

    /* ── Job list ─────────────────────────────────────────────── */
    #jobList { list-style: none; }

    .job-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--color-border);
      font-size: 11px;
      flex-wrap: wrap;
    }
    .job-item__id { font-family: monospace; color: var(--color-text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .job-item__meta { color: var(--color-text-secondary); white-space: nowrap; }

    /* ── Badges ───────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge--neutral { background: rgba(255,255,255,0.08); color: var(--color-text-secondary); }
    .badge--accent  { background: var(--color-accent-faint); color: var(--color-accent); }
    .badge--success { background: var(--color-success-faint); color: var(--color-success); }
    .badge--danger  { background: var(--color-danger-soft); color: var(--color-danger); }

    /* ── Empty / misc ─────────────────────────────────────────── */
    .empty-hint {
      padding: 14px 10px;
      font-size: 12px;
      color: var(--color-text-secondary);
      font-style: italic;
    }

    /* ── Status bar ───────────────────────────────────────────── */
    .statusbar {
      height: var(--statusbar-height);
      font-size: 11px;
      display: flex;
      align-items: stretch;
      background: var(--color-statusbar);
      border-top: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      flex-shrink: 0;
      overflow: hidden;
    }

    /* Left connection segment — VS Code style */
    .statusbar__conn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
      transition: filter 0.15s;
    }
    .statusbar__conn:hover { filter: brightness(1.15); }

    .statusbar__conn[data-state="local"]      { background: #3a3a4a; color: #aaa; }
    .statusbar__conn[data-state="connecting"] { background: #7c5c00; color: #fcd34d; }
    .statusbar__conn[data-state="connected"]  { background: #166534; color: #86efac; }
    .statusbar__conn[data-state="error"]      { background: #7f1d1d; color: #fca5a5; }

    .statusbar__conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    [data-state="local"]      .statusbar__conn-dot { background: #888; }
    [data-state="connecting"] .statusbar__conn-dot { background: #fcd34d; animation: pulse 1s infinite; }
    [data-state="connected"]  .statusbar__conn-dot { background: #4ade80; }
    [data-state="error"]      .statusbar__conn-dot { background: #f87171; }

    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }

    .statusbar__msg {
      flex: 1;
      padding: 0 10px;
      display: flex;
      align-items: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Backend config popover ───────────────────────────────── */
    .conn-popover-backdrop {
      position: fixed; inset: 0;
      z-index: 200;
    }
    .conn-popover {
      position: fixed;
      bottom: calc(var(--statusbar-height) + 4px);
      left: 0;
      z-index: 201;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 14px;
      width: 340px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .conn-popover h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 2px;
    }
    .conn-popover label {
      font-size: 11px;
      color: var(--color-text-secondary);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .conn-popover select,
    .conn-popover input[type="text"] {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-text-primary);
      font-size: 12px;
      padding: 5px 8px;
      width: 100%;
    }
    .conn-popover select:focus,
    .conn-popover input[type="text"]:focus {
      outline: 1px solid var(--color-accent);
      border-color: var(--color-accent);
    }
    .conn-popover__actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 4px;
    }

    /* ── View tabs ────────────────────────────────────────────── */
    .view-tabs {
      display: flex;
      gap: 2px;
    }
    .view-tab {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--color-text-secondary);
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.1s, color 0.1s;
    }
    .view-tab:hover { background: var(--color-accent-faint); color: var(--color-text-primary); }
    .view-tab--active {
      background: var(--color-accent-faint);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* ── Shared button/input classes for corpus panels ─────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      background: transparent;
      color: var(--color-text-primary);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: var(--color-accent-faint); border-color: var(--color-accent); }
    .btn--primary { background: var(--color-accent); border-color: var(--color-accent); color: #000; }
    .btn--primary:hover { background: var(--color-accent-hover); }
    .btn--secondary { background: var(--color-bg-secondary); }
    .btn--ghost { background: transparent; border-color: transparent; }
    .btn--ghost:hover { background: var(--color-accent-faint); border-color: var(--color-accent); }
    .btn--icon { padding: 4px 8px; }
    .input {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-text-primary);
      font-size: 13px;
      padding: 6px 10px;
      width: 100%;
    }
    .input:focus { outline: 1px solid var(--color-accent); border-color: var(--color-accent); }
    .input--sm { font-size: 12px; padding: 4px 8px; }
    .label { font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 4px; }

    /* ── Corpus Browser ────────────────────────────────────────── */
    .corpus-browser { display: flex; flex-direction: column; gap: 16px; max-width: 900px; }
    .corpus-browser__header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .corpus-browser__title { font-size: 18px; font-weight: 600; color: var(--color-text-primary); }
    .corpus-browser__create-form {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .corpus-browser__form-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .corpus-browser__list { display: flex; flex-direction: column; gap: 8px; }
    .corpus-browser__empty {
      padding: 32px; text-align: center;
      color: var(--color-text-secondary); font-style: italic; line-height: 1.8;
    }

    /* ── Corpus Card ───────────────────────────────────────────── */
    .corpus-card {
      display: flex; align-items: stretch;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .corpus-card:hover { border-color: var(--color-accent); }
    .corpus-card__body {
      display: flex; align-items: center; gap: 12px;
      flex: 1; padding: 12px 14px; cursor: pointer;
    }
    .corpus-card__icon { font-size: 24px; flex-shrink: 0; }
    .corpus-card__info { display: flex; flex-direction: column; gap: 4px; }
    .corpus-card__name { font-weight: 600; font-size: 14px; }
    .corpus-card__desc { font-size: 12px; color: var(--color-text-secondary); }
    .corpus-card__meta { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .corpus-card__date { color: var(--color-text-secondary); }
    .corpus-card__delete {
      align-self: center; margin-right: 10px;
      opacity: 0.4;
    }
    .corpus-card:hover .corpus-card__delete { opacity: 1; }

    /* ── Recording Gallery ─────────────────────────────────────── */
    .recording-gallery { display: flex; flex-direction: column; gap: 12px; height: 100%; }
    .recording-gallery__header {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .recording-gallery__title { font-size: 16px; font-weight: 600; flex: 1; }
    .recording-gallery__header-actions { display: flex; gap: 6px; }
    .recording-gallery__toolbar {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap;
    }
    .recording-gallery__search { max-width: 240px; }
    .recording-gallery__tag-filter { display: flex; gap: 4px; flex-wrap: wrap; }
    .recording-gallery__field-filters { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 4px; }
    .field-filter-select { min-width: 120px; max-width: 180px; }
    .recording-gallery__stats { font-size: 12px; color: var(--color-text-secondary); flex-shrink: 0; }
    .recording-gallery__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      overflow-y: auto;
      flex: 1;
    }
    .recording-gallery__loading { grid-column: 1/-1; padding: 32px; text-align: center; color: var(--color-text-secondary); }
    .recording-gallery__empty { grid-column: 1/-1; padding: 32px; text-align: center; color: var(--color-text-secondary); font-style: italic; line-height: 2; }
    .recording-gallery__pagination { flex-shrink: 0; display: flex; justify-content: center; padding: 8px 0; }

    /* ── Recording Card ────────────────────────────────────────── */
    .recording-card {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.1s;
    }
    .recording-card:hover { border-color: var(--color-accent); background: var(--color-accent-faint); }
    .recording-card__waveform {
      width: 80px; height: 36px; flex-shrink: 0;
      border-radius: 3px;
      background: var(--color-bg-tertiary, #1a1f2e) no-repeat center / cover;
      /* Placeholder-Muster solange Thumbnail lädt */
      background-image: repeating-linear-gradient(
        90deg,
        var(--color-border) 0 1px,
        transparent 1px 4px
      );
    }
    .recording-card__waveform--loaded {
      background-image: var(--waveform-url);  /* wird per JS gesetzt */
      background-image: none; /* überschrieben durch inline style */
    }
    .recording-card__info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .recording-card__name {
      font-size: 12px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .recording-card__meta { display: flex; gap: 6px; font-size: 11px; color: var(--color-text-secondary); }
    .recording-card__tags { display: flex; gap: 3px; flex-wrap: wrap; }

    /* ── Tag Pills ─────────────────────────────────────────────── */
    .tag-pill {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 10px;
      border: 1px solid var(--color-border);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 11px; cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .tag-pill:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .tag-pill--active {
      background: var(--color-accent-faint);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }
    .tag-pill--sm { padding: 1px 6px; font-size: 10px; }

    /* ── Corpus Detail Sidebar ─────────────────────────────────── */
    .corpus-detail-sidebar {
      width: 260px; flex-shrink: 0;
      border-left: 1px solid var(--color-border);
      overflow-y: auto;
      background: var(--color-bg-secondary);
    }
    .detail-panel { display: flex; flex-direction: column; height: 100%; }
    .detail-panel--empty { justify-content: center; align-items: center; }
    .detail-panel__placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--color-text-secondary); }
    .detail-panel__placeholder-icon { font-size: 32px; }
    .detail-panel__placeholder-text { font-size: 12px; }

    .detail-panel__header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px; border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .detail-panel__title {
      flex: 1; font-weight: 600; font-size: 12px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .detail-panel__close { font-size: 11px; opacity: 0.6; }
    .detail-panel__close:hover { opacity: 1; }
    .detail-panel__body { flex: 1; overflow-y: auto; padding: 0; }
    .detail-panel__footer {
      padding: 10px 12px; border-top: 1px solid var(--color-border); flex-shrink: 0;
    }
    .detail-panel__open-btn { width: 100%; justify-content: center; }

    .detail-section {
      padding: 10px 12px; border-bottom: 1px solid var(--color-border);
    }
    .detail-section__label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--color-text-secondary);
      margin-bottom: 5px;
    }
    .detail-section__value { font-size: 12px; word-break: break-all; }
    .detail-section__value--mono { font-family: ui-monospace, monospace; font-size: 11px; opacity: 0.8; }

    .detail-meta-grid { display: flex; flex-direction: column; gap: 3px; }
    .detail-meta-row { display: flex; gap: 8px; font-size: 11px; }
    .detail-meta-row__label { color: var(--color-text-secondary); min-width: 70px; flex-shrink: 0; }
    .detail-meta-row__value { font-weight: 500; }

    .detail-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .detail-tags__empty { font-size: 11px; color: var(--color-text-secondary); }
    .detail-tag {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--color-accent-faint); border: 1px solid var(--color-accent);
      color: var(--color-accent); border-radius: 10px; padding: 1px 7px;
      font-size: 11px;
    }
    .detail-tag__remove { background: none; border: none; cursor: pointer; color: inherit; padding: 0; font-size: 9px; opacity: 0.7; }
    .detail-tag__remove:hover { opacity: 1; }
    .detail-tag-add { display: flex; gap: 6px; }
    .detail-tag-input { flex: 1; min-width: 0; }

    .analysis-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .analysis-table td { padding: 3px 4px; }
    .analysis-table__label { font-style: italic; }
    .analysis-table__conf { text-align: right; color: var(--color-success); font-weight: 600; }
    .analysis-table__time { text-align: right; color: var(--color-text-secondary); }

    /* ── Import Wizard ─────────────────────────────────────────── */
    .import-wizard { display: flex; flex-direction: column; gap: 16px; max-width: 640px; }
    .import-wizard__header { display: flex; flex-direction: column; gap: 4px; }
    .import-wizard__title { font-size: 18px; font-weight: 600; }
    .import-wizard__subtitle { font-size: 12px; color: var(--color-text-secondary); }

    .wizard-steps { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .wizard-step { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--color-border); color: var(--color-text-secondary); }
    .wizard-step--active { border-color: var(--color-accent); color: var(--color-accent); background: var(--color-accent-faint); }
    .wizard-step--done { border-color: var(--color-success); color: var(--color-success); }
    .wizard-step-sep { color: var(--color-text-secondary); }

    .wizard-step-content { display: flex; flex-direction: column; gap: 12px; }
    .wizard-step-content--center { align-items: center; justify-content: center; padding: 32px; }
    .wizard-hint { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; }
    .wizard-hint--sm { font-size: 12px; }
    .wizard-folder-row { display: flex; gap: 8px; }
    .wizard-pattern-row { display: flex; flex-direction: column; gap: 4px; }
    .wizard-pattern-preview {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 12px;
    }
    .pattern-token { padding: 1px 5px; border-radius: 3px; background: rgba(255,255,255,0.06); }
    .pattern-token--field { background: var(--color-accent-faint); color: var(--color-accent); }
    .pattern-preview__fields { margin-top: 6px; color: var(--color-text-secondary); }
    .pattern-preview__msg { color: var(--color-text-secondary); font-style: italic; }
    .wizard-examples-list { list-style: none; display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--color-text-secondary); }
    .wizard-examples-list li code { color: var(--color-accent); }

    .wizard-spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .wizard-done-icon { font-size: 36px; text-align: center; }
    .wizard-done-title { font-size: 15px; font-weight: 600; text-align: center; }
    .wizard-done-stats { display: flex; gap: 16px; justify-content: center; }
    .wizard-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .wizard-stat__val { font-size: 22px; font-weight: 700; color: var(--color-accent); }
    .wizard-stat--danger .wizard-stat__val { color: var(--color-danger); }
    .wizard-stat__label { font-size: 11px; color: var(--color-text-secondary); }
    .wizard-errors { font-size: 12px; color: var(--color-danger); }
    .wizard-errors ul { list-style: none; margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
    .wizard-pattern-examples { font-size: 12px; }

    .import-wizard__body {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 16px;
    }
    .import-wizard__footer { display: flex; justify-content: flex-end; gap: 8px; }
  </style>
</head>
<body>

  <!-- ── Topbar: brand + view switcher + theme toggle ── -->
  <header class="topbar">
    <span class="brand-title">SignaVis</span>
    <div class="tb-sep"></div>
    <div class="view-tabs" id="viewTabs">
      <button class="view-tab view-tab--active" data-view="labeling" type="button">Beschriftung</button>
      <button class="view-tab" data-view="corpus" type="button">Corpus Browser</button>
    </div>
    <span class="tb-spacer"></span>
    <button class="tb-btn" id="themeToggleBtn" type="button" style="font-size:14px;padding:2px 8px;line-height:1">☀</button>
  </header>

  <!-- Hidden trigger elements so JS event listeners still bind correctly -->
  <div hidden>
    <button id="newProjectBtn"  type="button"></button>
    <button id="openFolderBtn"  type="button"></button>
    <button id="importFileBtn"  type="button"></button>
    <button id="runAnalysisBtn" type="button"></button>
    <button id="refreshJobsBtn" type="button"></button>
  </div>

  <!-- ── Corpus Browser View (hidden by default) ──────────────── -->
  <div id="corpusBrowserView" style="display:none; flex:1; overflow:hidden;">
    <div id="corpusBrowserMount" style="flex:1; height:100%; overflow:auto; padding:16px; min-width:0;"></div>
    <div id="corpusDetailMount" class="corpus-detail-sidebar"></div>
  </div>

  <!-- ── Main layout ───────────────────────────────────────────── -->
  <div class="layout" id="labelingView">

    <!-- Left: Projects -->
    <div class="panel">
      <div class="panel__header">
        <span>Projects</span>
      </div>
      <div class="panel__body">
        <ul id="projectList">
          <li class="empty-hint">Loading…</li>
        </ul>
      </div>
    </div>

    <!-- Centre: File browser + Player -->
    <div class="centre-pane">

      <!-- File browser (hidden until a folder is opened) -->
      <div id="fileBrowserPanel" hidden>
        <div class="panel__header">
          <span>Files — <span id="folderLabel" style="font-weight:400;text-transform:none;letter-spacing:0"></span></span>
        </div>
        <ul id="fileList"></ul>
      </div>

      <!-- Player (hidden until a file is loaded) -->
      <div id="playerContainer" hidden></div>

      <!-- Placeholder shown when nothing is loaded -->
      <div class="centre-placeholder" id="centrePlaceholder">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <p>Click <strong>Open Folder…</strong> to browse local audio files, or <strong>Import File…</strong> to add a file to the active project.</p>
      </div>

    </div>

    <!-- Right: Job queue -->
    <div class="panel">
      <div class="panel__header">
        <span>Analysis Jobs</span>
      </div>
      <div class="panel__body">
        <ul id="jobList">
          <li class="empty-hint">No jobs yet.</li>
        </ul>
      </div>
    </div>

  </div>

  <!-- ── Status bar ─────────────────────────────────────────────── -->
  <div class="statusbar">
    <button class="statusbar__conn" id="connSegment" data-state="local" type="button"
            title="Click to configure analysis backend">
      <span class="statusbar__conn-dot"></span>
      <span id="connLabel">Local</span>
    </button>
    <span class="statusbar__msg" id="statusBar">Initialising…</span>
  </div>

  <!-- ── Backend config popover (hidden by default) ─────────────── -->
  <div class="conn-popover-backdrop" id="connPopoverBackdrop" hidden></div>
  <div class="conn-popover" id="connPopover" hidden>
    <h3>Analysis Backend</h3>
    <label>
      Mode
      <select id="connModeSelect">
        <option value="local">Local (in-app)</option>
        <option value="server">Server (HTTP)</option>
        <option value="cloud">Cloud (HTTP)</option>
      </select>
    </label>
    <label id="connEndpointRow">
      Server endpoint
      <input type="text" id="connEndpointInput" placeholder="http://localhost:8787" />
    </label>
    <div class="conn-popover__actions">
      <button class="tb-btn" id="connCancelBtn" type="button">Cancel</button>
      <button class="tb-btn tb-btn--primary" id="connApplyBtn" type="button">Apply</button>
    </div>
  </div>

  <script type="module" src="../src/app/desktop-app.ts"></script>
</body>
</html>
