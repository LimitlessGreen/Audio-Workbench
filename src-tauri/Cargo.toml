[package]
name = "audio-workbench"
version = "0.6.2"
edition = "2021"
description = "Audio Workbench – desktop shell"
license = "AGPL-3.0-only"

# Lib crate so commands can be integration-tested without a running Tauri app.
[lib]
name = "audio_workbench_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri          = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs     = "2"
tauri-plugin-shell  = "2"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
