openapi: 3.1.0
info:
  title: SignaVis Platform API
  version: 0.2.0
servers:
  - url: http://localhost:8788
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      security: []
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  db: { type: boolean }
                  redis: { type: boolean }
  /metrics:
    get:
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: in-process metrics snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  metrics:
                    type: object
                    additionalProperties: true
                  timestamp: { type: string, format: date-time }
  /api/v1/auth/me:
    get:
      operationId: getAuthContext
      responses:
        '200':
          description: current auth context
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  auth:
                    type: object
                    nullable: true
                    properties:
                      subject: { type: string }
                      email: { type: string }
                      roles:
                        type: array
                        items: { type: string }
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/audit-events:
    get:
      operationId: listAuditEvents
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: recent audit events for project
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role reviewer or higher required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/projects:
    get:
      operationId: listProjects
      parameters:
        - in: query
          name: teamId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: list of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (team scope denied)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (team scope denied or createdBy mismatch)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/projects/{projectId}/assets:
    get:
      operationId: listProjectAssets
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: list of project assets
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role viewer or higher required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: importProjectAsset
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportAssetRequest'
      responses:
        '201':
          description: imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role annotator or higher required, importedBy must match actor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/jobs:
    get:
      operationId: listJobs
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: list of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role viewer or higher required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role annotator or higher required, createdBy must match actor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/jobs/{jobId}:
    get:
      operationId: getJob
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role viewer or higher required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: cancelJob
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202':
          description: cancellation requested
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role manager or higher required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/jobs/{jobId}/requeue:
    post:
      operationId: requeueJob
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202':
          description: job requeued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role manager or higher required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/jobs-dlq:
    get:
      operationId: listDlqJobs
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: jobs currently in dead-letter queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role reviewer or higher required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/import-jobs:
    deprecated: true
    get:
      operationId: listImportJobs
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: list of import jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImportJob'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role viewer or higher required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createImportJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, createdBy]
              properties:
                projectId: { type: string, format: uuid }
                source:
                  type: string
                  enum: [local, xeno-canto]
                totalItems: { type: integer, minimum: 0 }
                createdBy: { type: string, format: uuid }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: forbidden (project role annotator or higher required, createdBy must match actor)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
        reason: { type: string }
    CreateProjectRequest:
      type: object
      required: [teamId, name, createdBy]
      properties:
        teamId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        createdBy: { type: string, format: uuid }
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        teamId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        archived: { type: boolean }
        recordingCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ImportAssetRequest:
      type: object
      required: [sourceType, sourceRef, importedBy]
      properties:
        sourceType:
          type: string
          enum: [local, xeno-canto, upload]
        sourceRef: { type: string }
        metadata:
          type: object
          additionalProperties: true
        importedBy: { type: string, format: uuid }
    Asset:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        type:
          type: string
          enum: [audio, image, video]
        sourceType:
          type: string
          enum: [local, xeno-canto, upload]
        sourceRef: { type: string }
        storageUri: { type: string }
        checksum: { type: string }
        sizeBytes: { type: integer }
        metadata:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateJobRequest:
      type: object
      required: [projectId, type, createdBy]
      properties:
        projectId: { type: string, format: uuid }
        assetId: { type: string, format: uuid }
        type:
          type: string
          enum: [import, analysis, embedding, clustering]
        backend:
          type: string
          enum: [local, server, cloud]
        priority:
          type: string
          enum: [low, normal, high]
        payload:
          type: object
          additionalProperties: true
        createdBy: { type: string, format: uuid }
    Job:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        assetId: { type: string, format: uuid }
        type:
          type: string
          enum: [import, analysis, embedding, clustering]
        backend:
          type: string
          enum: [local, server, cloud]
        status:
          type: string
          enum: [queued, running, partial, failed, done, cancelled]
        progress: { type: number, minimum: 0, maximum: 1 }
        errorCode: { type: string }
        errorMessage: { type: string }
        createdBy: { type: string, format: uuid }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AuditEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }
        eventType: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        payload:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
    ImportJob:
      type: object
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        source:
          type: string
          enum: [local, xeno-canto]
        status:
          type: string
          enum: [queued, running, partial, failed, done]
        totalItems: { type: integer }
        processedItems: { type: integer }
        failedItems: { type: integer }
        errorLog: { type: string }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
