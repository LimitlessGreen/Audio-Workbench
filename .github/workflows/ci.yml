name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*", "v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.19", "22.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build library + types
        run: npm run build

      - name: Check version sync
        run: bash ./scripts/check-version-sync.sh

      - name: Check npm package archive
        run: npm pack

      - name: Upload build artifacts
        if: ${{ matrix.node-version == '22.12' }}
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.run_id }}
          path: |
            dist/
            types/
            *.tgz

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync & check Python package
        run: |
          bash ./scripts/sync-assets.sh --no-build
          cd python-wrapper
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.run_id }}

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          {
            echo 'NOTES<<EOF'
            git log --pretty=format:'- %s (%h)' "${RANGE}" -- ':!VERSION' ':!package.json' ':!python-wrapper/pyproject.toml'
            echo ''
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.NOTES }}
          files: dist/**

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.12"
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm always-auth
        run: npm config set always-auth true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.run_id }}

      - name: Check version sync (incl. tag)
        run: bash ./scripts/check-version-sync.sh

      - name: Setup npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Publish npm (use packed tarball if available)
        run: |
          set -euo pipefail
          TAR=$(ls *.tgz 2>/dev/null | head -n1 || true)
          if [ -n "$TAR" ]; then
            echo "Publishing tarball $TAR"
            npm publish "$TAR" --access public
          else
            echo "No tarball found - falling back to project-level publish (this may run build scripts)."
            npm publish --access public
          fi

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.run_id }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check version sync (incl. tag)
        run: bash ./scripts/check-version-sync.sh

      - name: Sync assets & publish Python package
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          # ensure python wrapper has up-to-date assets, then build/upload from python-wrapper
          bash ./scripts/sync-assets.sh --no-build
          cd python-wrapper
          python -m pip install --upgrade pip build twine
          python -m build
          shopt -s nullglob
          packages=(dist/*.tar.gz dist/*.whl dist/*.zip)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "No distribution files found in python-wrapper/dist"
            ls -la dist || true
            exit 1
          fi
          python -m twine check "${packages[@]}"
          python -m twine upload --non-interactive -u "$TWINE_USERNAME" -p "$TWINE_PASSWORD" "${packages[@]}"
