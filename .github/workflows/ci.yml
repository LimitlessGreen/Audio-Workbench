name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build library + types
        run: npm run build

      - name: Check version sync
        run: bash ./scripts/check-version-sync.sh

      - name: Check npm package archive
        run: npm pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            types/

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync & check Python package
        run: |
          bash ./scripts/sync-assets.sh --no-build
          cd python-wrapper
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          {
            echo 'NOTES<<EOF'
            git log --pretty=format:'- %s (%h)' "${RANGE}" -- ':!VERSION' ':!package.json' ':!python-wrapper/pyproject.toml'
            echo ''
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.NOTES }}
          generate_release_notes: true

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Check version sync (incl. tag)
        run: bash ./scripts/check-version-sync.sh

      - name: Setup npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish npm
        run: npm publish --access public

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Check version sync (incl. tag)
        run: bash ./scripts/check-version-sync.sh

      - name: Sync assets & publish Python package
        run: |
          bash ./scripts/sync-assets.sh --no-build
          cd python-wrapper
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
