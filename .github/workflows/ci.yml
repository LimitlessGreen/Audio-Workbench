name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  package-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check version sync
        run: bash ./scripts/check-version-sync.sh

      - name: Check src/dist sync
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            bash ./scripts/check-dist-sync.sh "origin/${{ github.base_ref }}"
          else
            bash ./scripts/check-dist-sync.sh "origin/main"
          fi

      - name: Check npm package archive
        run: npm pack

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python package
        run: |
          cd python-wrapper
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check version sync (incl. tag)
        run: bash ./scripts/check-version-sync.sh

      - name: Setup npm for trusted publishing
        run: |
          npm install -g npm@11.5.1
          node --version
          npm --version

      - name: Publish npm
        run: npm publish --access public

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check version sync (incl. tag)
        run: bash ./scripts/check-version-sync.sh

      - name: Build Python package
        run: |
          cd python-wrapper
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        run: |
          cd python-wrapper
          python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
