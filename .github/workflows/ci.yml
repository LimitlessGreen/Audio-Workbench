name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*", "v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.19", "22.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build library + types
        run: npm run build

      - name: Check version sync
        run: bash ./scripts/check-version-sync.sh

      - name: Check npm package archive
        run: npm pack

      - name: Upload build artifacts
        if: ${{ matrix.node-version == '22.12' }}
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.run_id }}
          path: |
            dist/
            types/
            *.tgz

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync & check Python package
        run: |
          bash ./scripts/sync-assets.sh --no-build
          cd python-wrapper
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.run_id }}

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          {
            echo 'NOTES<<EOF'
            git log --pretty=format:'- %s (%h)' "${RANGE}" -- ':!VERSION' ':!package.json' ':!python-wrapper/pyproject.toml'
            echo ''
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.NOTES }}
          files: dist/**

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.12"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.run_id }}

      - name: Check version sync (incl. tag)
        run: bash ./scripts/check-version-sync.sh

      - name: Setup npm for trusted publishing
        run: npm install -g npm@latest
      - name: Ensure NPM token is available
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "Error: repository secret NPM_TOKEN is not set. Add it in Settings → Secrets to enable npm publish.";
            exit 1;
          fi

      - name: Setup npm for trusted publishing
        run: npm install -g npm@latest

      - name: Setup npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc

      - name: Publish npm (use packed tarball if available)
        run: |
          set -euo pipefail
          TAR=$(ls *.tgz 2>/dev/null | head -n1 || true)
          if [ -n "$TAR" ]; then
            echo "Publishing tarball $TAR"
            npm publish "$TAR" --access public
          else
            echo "No tarball found — falling back to project-level publish (this may run build scripts)."
            npm publish --access public
          fi

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

                - name: Setup Node for OIDC publishing
                  uses: actions/setup-node@v6
                  with:
                    node-version: "24"
                    registry-url: 'https://registry.npmjs.org'

                - name: Ensure npm CLI supports OIDC
                  run: npm install -g npm@11.5.1

                - name: Download build artifacts
                  uses: actions/download-artifact@v8
                  with:
                    name: dist-${{ github.run_id }}

                - name: Check version sync (incl. tag)
                  run: bash ./scripts/check-version-sync.sh

                - name: Publish to npm (trusted publishing via OIDC)
                  run: npm publish --access public
          python -m twine check dist/*
