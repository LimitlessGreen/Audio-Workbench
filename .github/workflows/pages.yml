name: Deploy Demo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Assemble demo site
        run: |
          mkdir -p _site/dist _site/demo/samples
          # Library assets (referenced as ../dist/ from demo/)
          cp dist/birdnet-player.iife.js _site/dist/
          cp dist/birdnet-player.iife.js.map _site/dist/ 2>/dev/null || true
          cp dist/birdnet-player.css _site/dist/
          # Demo pages and assets
          cp demo/index.html     _site/demo/
          cp demo/storybook.html _site/demo/
          cp demo/stories.js     _site/demo/
          cp -r demo/samples/    _site/demo/samples/
          # Root redirect → demo/index.html
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=demo/">
          <a href="demo/">Audio Workbench Demo</a>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v6
